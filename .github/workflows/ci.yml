name: Wrong CI/CD Pipeline

on:
  push:
    branches:
      - main   # Change to your branch name if different

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Dependencies
        run: npm install

      - name: Deploy
        run: npm run deploy

      - name: Run Tests
        run: npm test

      - name: Build Project
        run: npm run build